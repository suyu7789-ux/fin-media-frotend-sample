<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>安全支付 - FIN-MEDIA</title>
    <style>
        :root { --bg-dark: #0B101E; --bg-card: #151B2E; --accent-gold: #F59E0B; }
        body { background: var(--bg-dark); color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .pay-card { background: var(--bg-card); padding: 40px; border-radius: 12px; text-align: center; width: 400px; border: 1px solid #1E293B; }
        .qr-code { width: 200px; height: 200px; background: #fff; margin: 25px auto; padding: 10px; }
        .btn-done { background: var(--accent-gold); color: #000; border: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="pay-card">
        <h3>订单确认</h3>
        <p style="color:#94A3B8; margin-top:10px;">支付项目：余额充值</p>
        <h2 style="color:var(--accent-gold); margin:20px 0;">￥ 200.00</h2>
        <div class="qr-code"><img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=FINMEDIA_PAY" alt="QR"></div>
        <p style="font-size:13px; color:#94A3B8;">请使用 微信/支付宝 扫描二维码支付</p>
        <button class="btn-done" onclick="window.location.href='user.html'">我已支付</button>
    </div>
</body>
</html>
