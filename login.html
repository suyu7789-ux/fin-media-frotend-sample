<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 - FIN-MEDIA</title>
    <style>
        :root { --bg-dark: #0B101E; --bg-card: #151B2E; --border-color: #1E293B; --text-main: #F8FAFC; --text-muted: #94A3B8; --accent-gold: #F59E0B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        a:hover { color: var(--accent-gold); }
        ul { list-style: none; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo-area h1 { color: var(--accent-gold); font-size: 24px; letter-spacing: 1px; }
        .logo-area p { font-size: 12px; color: var(--text-muted); }
        nav ul { display: flex; gap: 25px; font-weight: bold; }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .search-box { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-main); outline: none; }
        .btn-publish { background-color: var(--accent-gold); color: #000; padding: 8px 16px; border-radius: 4px; font-weight: bold; font-size: 14px; }

        .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 80px); }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { text-align: center; color: var(--accent-gold); margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .form-control { width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); font-size: 14px; outline: none; }
        .form-control:focus { border-color: var(--accent-gold); }
        .btn-primary { background: var(--accent-gold); color: #000; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <a href="index.html"><h1>FIN-MEDIA</h1></a>
            <p>洞悉市场，发现价值</p>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="category.html">宏观经济</a></li>
                <li><a href="stock.html">股市动态</a></li>
                <li><a href="authors.html">专栏作者</a></li>
                <li><a href="flash.html">7x24快讯</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <input type="text" class="search-box" placeholder="搜索代码、文章、作者..." onkeydown="if(event.keyCode==13) window.location.href='search.html'">
            <a href="login.html" class="btn-publish" style="color:#000;">✎ 发布文章</a>
            <a href="user.html"><div style="width: 35px; height: 35px; background: #cbd5e1; border-radius: 50%; cursor: pointer;"></div></a>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>登录 FIN-MEDIA</h2>
            <div class="form-group">
                <label>邮箱 / 手机号</label>
                <input type="text" class="form-control" placeholder="请输入您的账号">
            </div>
            <div class="form-group">
                <label style="display: flex; justify-content: space-between;">
                    密码 <a href="#" style="color: var(--text-muted); font-size: 12px;">忘记密码？</a>
                </label>
                <input type="password" class="form-control" placeholder="请输入您的密码">
            </div>
            <a href="index.html"><button class="btn-primary">登 录</button></a>
            <div style="text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 12px; position: relative;">
                <span style="background: var(--bg-card); padding: 0 10px; position: relative; z-index: 1;">或者使用第三方登录</span>
                <hr style="position: absolute; top: 50%; width: 100%; border: 0; border-top: 1px solid var(--border-color); margin: 0; z-index: 0;">
            </div>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; cursor: pointer;">G</div>
                <div style="width: 40px; height: 40px; border-radius: 50%; background: #10B981; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff;">W</div>
            </div>
            <div class="auth-footer">还没有账号？ <a href="#" style="color: var(--accent-gold);">立即注册</a></div>
        </div>
    </div>
</body>
</html>
