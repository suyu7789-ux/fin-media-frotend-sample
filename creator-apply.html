<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>申请入驻 - FIN-MEDIA</title>
    <style>
        :root { --bg-dark: #0B101E; --bg-card: #151B2E; --text-main: #F8FAFC; --text-muted: #94A3B8; --accent-gold: #F59E0B; --border-color: #1E293B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        .container { max-width: 700px; margin: 50px auto; padding: 40px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); }
        .step-info { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .step { font-size: 14px; color: var(--text-muted); }
        .step.active { color: var(--accent-gold); font-weight: bold; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 14px; }
        input, select, textarea { width: 100%; background: var(--bg-dark); border: 1px solid var(--border-color); padding: 12px; border-radius: 4px; color: #fff; outline: none; }
        .btn-submit { width: 100%; background: var(--accent-gold); color: #000; padding: 14px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<script src="common.js"></script>
<body>
    <header id="global-header"></header>
    <div class="container">
        <h2 style="margin-bottom: 10px;">申请成为创作者</h2>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:30px;">通过认证后，你将获得发布深度研报、开启付费专栏的权限。</p>
        <div class="step-info">
            <div class="step active">1. 提交资料</div><div class="step">2. 资质审核</div><div class="step">3. 开启权限</div>
        </div>
        <div class="form-group"><label>真实姓名 / 机构名称</label><input type="text" placeholder="输入真实名称"></div>
        <div class="form-group"><label>擅长领域</label><select><option>宏观经济分析</option><option>个股深度研究</option><option>技术面交易</option></select></div>
        <div class="form-group"><label>专业背景描述</label><textarea rows="4" placeholder="请简述你的投资经历或从业背景..."></textarea></div>
        <div class="form-group"><label>上传证明材料 (名片/证书等)</label><div style="width:100px; height:100px; border:1px dashed var(--border-color); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:24px;">+</div></div>
        <button class="btn-submit" onclick="alert('资料已提交，请耐心等待 1-3 个工作日审核。')">确认提交</button>
    </div>
</body>
</html>
