<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>创作者工作台 - FIN-MEDIA</title>
    <style>
        :root { --bg-dark: #0B101E; --bg-card: #151B2E; --text-main: #F8FAFC; --text-muted: #94A3B8; --accent-gold: #F59E0B; --border-color: #1E293B; --up-red: #EF4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        a { text-decoration: none; color: inherit; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); }
        .logo-area h1 { color: var(--accent-gold); font-size: 24px; }
        .search-box { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-main); outline: none; }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 5%; display: flex; gap: 20px; }
        .sidebar { width: 240px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; height: fit-content; }
        .menu-item { padding: 15px 25px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: var(--bg-hover); color: var(--accent-gold); border-left: 4px solid var(--accent-gold); }

        .main-content { flex: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--accent-gold); margin-top: 5px; }
        .stat-label { font-size: 12px; color: var(--text-muted); }

        .content-table { width: 100%; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color); border-collapse: collapse; overflow: hidden; }
        .content-table th { background: var(--bg-dark); padding: 15px; text-align: left; font-size: 14px; color: var(--text-muted); }
        .content-table td { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .status-pub { background: rgba(16, 185, 129, 0.1); color: #10B981; }

        .btn-new { background: var(--accent-gold); color: #000; padding: 10px 25px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
<header>
    <div class="logo-area"><a href="index.html"><h1>FIN-MEDIA</h1></a></div>
    <div class="header-actions"><input type="text" id="globalSearchInput" class="search-box" placeholder="搜索..."></div>
</header>

<div class="container">
    <div class="sidebar">
        <div class="menu-item active">📊 运营看板</div>
        <div class="menu-item">📄 内容管理</div>
        <div class="menu-item">👥 粉丝管理</div>
        <div class="menu-item">💰 收益结算</div>
        <div class="menu-item">⚙️ 设置</div>
    </div>

    <div class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>创作者概览</h2>
            <a href="editor.html" class="btn-new">+ 发布新文章</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">总阅读量</div><div class="stat-val">128.4k</div></div>
            <div class="stat-card"><div class="stat-label">总粉丝数</div><div class="stat-val">8,532</div></div>
            <div class="stat-card"><div class="stat-label">昨日收益</div><div class="stat-val">￥425.00</div></div>
            <div class="stat-card"><div class="stat-label">内容互动率</div><div class="stat-val">12.5%</div></div>
        </div>

        <h3 style="margin-bottom:15px;">最近内容</h3>
        <table class="content-table">
            <thead><tr><th>标题</th><th>状态</th><th>阅读</th><th>点赞</th><th>发布时间</th></tr></thead>
            <tbody>
            <tr>
                <td>美联储降息路径重估...</td>
                <td><span class="status-tag status-pub">已发布</span></td>
                <td>12,400</td>
                <td>432</td>
                <td>2026-03-17</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
