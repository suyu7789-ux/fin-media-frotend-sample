<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>页面未找到 - FIN-MEDIA</title>
    <style>
        body { background: #0B101E; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        h1 { font-size: 120px; color: #F59E0B; margin: 0; }
        p { color: #94A3B8; font-size: 20px; margin: 20px 0 40px; }
        .btn-home { background: #F59E0B; color: #000; padding: 12px 35px; border-radius: 6px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>抱歉，您访问的页面已进入“黑洞”或已被删除</p>
        <a href="index.html" class="btn-home">带我回首页</a>
        <div style="margin-top:30px; font-size:14px; color:#475569;"><span id="timer">10</span> 秒后自动跳转</div>
    </div>
    <script>
        let s = 10;
        setInterval(() => {
            s--;
            document.getElementById('timer').innerText = s;
            if(s <= 0) window.location.href = 'index.html';
        }, 1000);
    </script>
</body>
</html>
